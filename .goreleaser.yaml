version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: markdown-formatter
    binary: markdown-formatter
    main: ./
    ldflags:
      - -s -w
      - -X github.com/i9wa4/markdown-formatter/internal/version.Version={{.Tag}}
      - -X github.com/i9wa4/markdown-formatter/internal/version.Commit={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: markdown-formatter
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: i9wa4
    name: markdown-formatter
  draft: false
  prerelease: auto

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
